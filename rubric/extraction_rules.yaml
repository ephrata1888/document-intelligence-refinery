triage_sampling_pages: 5

scanned_density_threshold: 0.0001

mixed_density_threshold: 0.002

table_area_ratio_threshold: 0.25

multi_column_gutter_threshold: 30.0

min_confidence_threshold: 0.85

max_doc_budget_usd: 0.05

cost_per_1k_tokens_vlm: 0.0001

domain_keywords:
  financial:
    - 'annual report'
    - 'balance sheet'
    - 'consolidated'
    - 'income statement'
  legal:
    - 'proclamation'
    - 'article'
    - 'decree'
    - 'regulation'
    - 'audit'
  government:
    - 'ministry of finance'
    - 'tax expenditure'
    - 'performance survey'
